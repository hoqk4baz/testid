# .github/workflows/build-dylib.yml
name: build-iokit-logger

on:
  workflow_dispatch: {}      # Actions sekmesinden manuel tetikle
  push:
    paths:
      - "iokit_logger.m"
      - "fishhook.c"
      - "fishhook.h"
      - ".github/workflows/build-dylib.yml"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Compile dylib
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -dynamiclib -fobjc-arc \
            -isysroot "$SDK" \
            -mios-version-min=15.0 \
            -framework UIKit \
            -framework CoreFoundation \
            -framework IOKit \
            -o iokit_logger.dylib \
            iokit_logger.m fishhook.c

      - name: Ad-hoc sign
        run: |
          codesign -f -s - --timestamp=none iokit_logger.dylib
          codesign -dv iokit_logger.dylib || true

      - name: Verify output
        run: |
          file iokit_logger.dylib
          otool -L iokit_logger.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iokit_logger
          path: iokit_logger.dylib
          if-no-found: error
