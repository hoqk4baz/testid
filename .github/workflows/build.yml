name: build-dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone fishhook
        run: git clone --depth 1 https://github.com/facebook/fishhook.git

      - name: Build LogWindow.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -dynamiclib \
            -fobjc-arc \
            -isysroot "$SDK" \
            -miphoneos-version-min=13.0 \
            -Ifishhook \
            -framework Foundation \
            -framework UIKit \
            -framework Security \
            -framework CoreFoundation \
            fishhook/fishhook.c logwindow.m \
            -o LogWindow.dylib

      - name: Ad-hoc codesign
        run: |
          codesign -f -s - LogWindow.dylib
          codesign -dvvv LogWindow.dylib || true
          otool -L LogWindow.dylib || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogWindow-dylib
          path: LogWindow.dylib
          if-no-files-found: error
