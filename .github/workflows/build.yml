# .github/workflows/build.yml
name: build-iokit-logger

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: ls -la

      - name: Fetch fishhook
        run: |
          curl -fsSL -O https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.c
          curl -fsSL -O https://raw.githubusercontent.com/facebook/fishhook/master/fishhook.h

      - name: Compile dylib
        run: |
          set -euo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -dynamiclib -fobjc-arc \
            -isysroot "$SDK" \
            -mios-version-min=15.0 \
            -framework UIKit \
            -framework CoreFoundation \
            -framework IOKit \
            -framework Security \
            -o iokit_logger.dylib \
            iokit_logger.m fishhook.c

      - name: Ad-hoc sign
        run: codesign -f -s - iokit_logger.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iokit_logger
          path: iokit_logger.dylib
          if-no-files-found: error
