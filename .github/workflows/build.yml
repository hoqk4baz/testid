# .github/workflows/build-dylib.yml
name: build-iokit-logger
on: { workflow_dispatch: {} }

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -dynamiclib \
            -isysroot "$SDK" \
            -framework CoreFoundation -framework IOKit \
            -o iokit_logger.dylib \
            iokit_logger.c fishhook.c
          # Sideload için ad-hoc imza
          codesign -f -s - iokit_logger.dylib
      - uses: actions/upload-artifact@v4
        with:
          name: iokit_logger
          path: iokit_logger.dylib
